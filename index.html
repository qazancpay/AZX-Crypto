<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Adsgram Test</title>
  <script src="https://adsgram.ai/sdk.js"></script>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: #f5f7fa;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      color: white;
      cursor: pointer;
    }

    #coin {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Adsgram Test</h1>

  <button onclick="showAd()">Reklam izle</button>

  <div id="coin">Coin: 0</div>

  <script>
    let coin = 0;

    const ad = window.Adsgram.init({
      blockId: "int-28280"
    });

    function showAd() {
      ad.show()
        .then(() => {
          // Reklam baxıldı
          coin += 1;
          document.getElementById("coin").innerText = "Coin: " + coin;
          alert("Reklam bitdi! +1 coin qazandın");
        })
        .catch(() => {
          alert("Reklam açılmadı və ya bağlandı");
        });
    }
  </script>

</body>
</html>
